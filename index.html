<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>TaskMaster</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="TaskMaster"/>
  <meta name="theme-color" content="#0f0f1a"/>
  <link rel="manifest" href="manifest.json"/>
  <style>
    :root {
      --bg: #0f0f1a;
      --bg2: #1a1a2e;
      --bg3: #22223a;
      --bg4: #2a2a45;
      --border: #2e2e50;
      --border2: #3a3a60;
      --green: #00e5a0;
      --green-dim: rgba(0,229,160,0.12);
      --green-dark: #00b87d;
      --red: #ff5a5a;
      --red-dim: rgba(255,90,90,0.12);
      --text: #e8e8f0;
      --text2: #8888aa;
      --text3: #4a4a6a;
      --radius: 14px;
      --radius-sm: 9px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none;}
    .app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;}

    /* Header */
    .header{padding:calc(var(--safe-top) + 14px) 16px 12px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
    .btn-icon{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
    .btn-icon svg{width:16px;height:16px;stroke:var(--text2);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
    .btn-icon.primary{background:var(--green);border-color:var(--green);}
    .btn-icon.primary svg{stroke:#000;}
    .header-info{flex:1;min-width:0;}
    .header-title{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .header-sub{font-size:11px;color:var(--text2);margin-top:1px;}

    /* Progress */
    .progress-wrap{padding:9px 16px;background:var(--bg2);border-bottom:1px solid var(--border);}
    .progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px;}
    .progress-bg{background:var(--bg3);border-radius:99px;height:4px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:99px;background:var(--green);transition:width .3s ease;}

    /* Tabs */
    .tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;}
    .tab{flex:1;padding:11px 0;font-size:13px;font-weight:600;text-align:center;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
    .tab.active{color:var(--green);border-bottom-color:var(--green);}
    .tab-count{display:inline-block;background:var(--bg3);color:var(--text2);font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px;margin-left:5px;}
    .tab.active .tab-count{background:var(--green-dim);color:var(--green);}

    /* Content */
    .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px;display:flex;flex-direction:column;gap:8px;}

    /* Folder card */
    .folder-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;}
    .folder-card.done-folder{border-color:rgba(0,229,160,0.3);}
    .folder-row{display:flex;align-items:center;gap:10px;padding:13px 14px;}
    .folder-icon{font-size:18px;flex-shrink:0;}
    .folder-info{flex:1;min-width:0;}
    .folder-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .folder-meta{font-size:11px;color:var(--text2);margin-top:2px;}
    .folder-done-badge{font-size:10px;font-weight:600;color:var(--green);background:var(--green-dim);padding:2px 7px;border-radius:99px;flex-shrink:0;}
    .btn-del{width:30px;height:30px;border-radius:var(--radius-sm);background:transparent;border:none;color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
    .btn-del svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .btn-del:active{color:var(--red);background:var(--red-dim);}
    .chevron-right{color:var(--text3);}
    .chevron-right svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

    /* Task card */
    .task-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;will-change:transform;}
    .task-row{display:flex;align-items:center;gap:10px;padding:12px 14px;}
    .task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:background .15s,border-color .15s;}
    .task-check.checked{background:var(--green);border-color:var(--green);}
    .task-check svg{display:none;width:11px;height:11px;stroke:#000;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
    .task-check.checked svg{display:block;}
    .task-body{flex:1;min-width:0;}
    .task-name{font-size:14px;line-height:1.4;}
    .task-name.done-text{text-decoration:line-through;color:var(--text3);}
    .sub-count{font-size:11px;color:var(--text2);margin-top:3px;}
    .btn-expand{width:30px;height:30px;border-radius:var(--radius-sm);background:var(--bg3);border:none;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .2s ease;}
    .btn-expand.open{transform:rotate(90deg);}
    .btn-expand svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

    /* Subtask items */
    .subtasks-wrap{border-top:1px solid var(--border);}
    .sub-item{display:flex;align-items:center;gap:10px;padding:9px 14px 9px 22px;border-bottom:1px solid var(--border);}
    .sub-item:last-child{border-bottom:none;}
    .sub-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:background .15s,border-color .15s;}
    .sub-check.checked{background:var(--green);border-color:var(--green);}
    .sub-check svg{display:none;width:9px;height:9px;stroke:#000;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
    .sub-check.checked svg{display:block;}
    .sub-name{flex:1;font-size:13px;color:var(--text2);}
    .sub-name.done-text{text-decoration:line-through;color:var(--text3);}

    /* Inline add subtask */
    .add-sub-row{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 22px;border-top:1px solid var(--border);}
    .add-sub-input{flex:1;background:transparent;border:none;font-size:13px;color:var(--text);outline:none;}
    .add-sub-input::placeholder{color:var(--text3);}
    .add-sub-btn{background:var(--green);border:none;border-radius:var(--radius-sm);color:#000;font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;flex-shrink:0;}

    /* Confirm bar */
    .confirm-bar{display:flex;align-items:center;gap:8px;padding:8px 14px 10px;border-top:1px solid var(--red-dim);background:rgba(255,90,90,0.05);}
    .confirm-bar span{font-size:12px;color:var(--red);flex:1;}
    .confirm-bar button{font-size:12px;padding:5px 11px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);}
    .confirm-bar button.yes{background:var(--red);border-color:var(--red);color:#fff;}

    /* Bottom bar */
    .bottom-bar{padding:10px 16px calc(var(--safe-bottom) + 10px);background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px;}
    .add-btn{width:100%;padding:12px;border:1.5px dashed var(--border2);border-radius:var(--radius);font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;background:transparent;}
    .add-btn:active{background:var(--bg3);}
    .add-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;}
    .clear-btn{width:100%;padding:9px;border-radius:var(--radius-sm);font-size:13px;color:var(--red);display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;background:var(--red-dim);border:none;}

    /* Empty */
    .empty{text-align:center;padding:50px 20px;color:var(--text3);}
    .empty-icon{font-size:36px;margin-bottom:10px;}
    .empty-text{font-size:13px;line-height:1.6;}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;}
    .overlay.open{opacity:1;pointer-events:all;}
    .modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding-bottom:calc(var(--safe-bottom) + 14px);transform:translateY(100%);transition:transform .24s cubic-bezier(0.32,0.72,0,1);border-top:1px solid var(--border2);}
    .overlay.open .modal{transform:translateY(0);}
    .modal-handle{width:38px;height:4px;background:var(--border2);border-radius:99px;margin:11px auto 14px;}
    .modal-title{font-size:15px;font-weight:700;padding:0 20px 13px;border-bottom:1px solid var(--border);}
    .modal-body{padding:14px 20px;}
    .field-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
    .modal-input{width:100%;font-size:15px;padding:12px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);outline:none;}
    .modal-input:focus{border-color:var(--green);}
    .modal-footer{display:flex;gap:10px;padding:14px 20px 0;}
    .modal-footer button{flex:1;padding:13px;border-radius:var(--radius);font-size:15px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);}
    .modal-footer button.primary{background:var(--green);border-color:var(--green);color:#000;font-weight:700;}

    /* Level indents for nested */
    .level-1 .task-row{padding-left:24px;}
    .level-2 .task-row{padding-left:38px;}
    .level-3 .task-row{padding-left:52px;}
  </style>
</head>
<body>
<div class="app">
  <div class="header" id="header">
    <div class="header-info">
      <div class="header-title" id="h-title">TaskMaster</div>
      <div class="header-sub" id="h-sub">Twoje foldery</div>
    </div>
    <div class="btn-icon primary" onclick="openAddModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label"><span id="prog-label">Ogólny postęp</span><span id="prog-pct">0%</span></div>
    <div class="progress-bg"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="tabs" id="tabs-bar" style="display:none">
    <div class="tab active" id="tab-active" onclick="setTab('active')">Aktywne <span class="tab-count" id="tc-active">0</span></div>
    <div class="tab" id="tab-done" onclick="setTab('done')">Zakończone <span class="tab-count" id="tc-done">0</span></div>
  </div>

  <div class="content" id="content"></div>

  <div class="bottom-bar" id="bottom-bar">
    <button class="clear-btn" id="clear-btn" onclick="clearDone()" style="display:none">🗑 Usuń zakończone</button>
    <button class="add-btn" onclick="openAddModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span id="add-label">Nowy folder</span>
    </button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Nowy folder</div>
    <div class="modal-body">
      <div class="field-label" id="modal-field-label">Nazwa folderu</div>
      <input class="modal-input" id="modal-input" placeholder="np. Dziś, Praca, Zakupy..."/>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal()">Anuluj</button>
      <button class="primary" onclick="confirmModal()">Dodaj</button>
    </div>
  </div>
</div>

<script>
// ── Data ───────────────────────────────────────────────
let data = JSON.parse(localStorage.getItem('tm3') || 'null') || {
  folders: [
    { id:'f1', name:'Dziś', tasks:[
      { id:'t1', name:'Zakupy', done:false, subtasks:[
        {id:'s1',name:'Chleb',done:false,subtasks:[]},
        {id:'s2',name:'Woda',done:false,subtasks:[]},
        {id:'s3',name:'Ciastka',done:true,subtasks:[]},
      ]},
      { id:'t2', name:'Zadzwonić do dentysty', done:false, subtasks:[] },
      { id:'t3', name:'Przejrzeć maile', done:true, subtasks:[] },
    ]},
    { id:'f2', name:'Praca', tasks:[
      { id:'t4', name:'Raport Q2', done:false, subtasks:[
        {id:'s4',name:'Zebrać dane',done:true,subtasks:[]},
        {id:'s5',name:'Napisać wnioski',done:false,subtasks:[]},
      ]},
    ]},
  ]
};

let view = { screen:'folders' }; // screens: folders | folder | task
let folderTab = 'active'; // 'active' | 'done'
let expanded = new Set();
let confirmDel = null;
let modalMode = null;
let modalCtx = {};

function save(){ localStorage.setItem('tm3', JSON.stringify(data)); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Lookups ────────────────────────────────────────────
function getFolder(fid){ return data.folders.find(f=>f.id===fid); }
function getNode(fid, path){
  let list = getFolder(fid)?.tasks;
  let node = null;
  for(const id of path){ node = list?.find(n=>n.id===id); list = node?.subtasks; }
  return node;
}
function getParentList(fid, path){
  if(path.length===1) return getFolder(fid)?.tasks;
  return getNode(fid, path.slice(0,-1))?.subtasks;
}
function countDone(tasks){
  let done=0,total=0;
  function walk(list){ list.forEach(t=>{ total++;if(t.done)done++;if(t.subtasks?.length) walk(t.subtasks); }); }
  walk(tasks); return {done,total};
}

// ── SVGs ───────────────────────────────────────────────
const IC_CHECK = `<svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>`;
const IC_BACK  = `<svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>`;
const IC_NEXT  = `<svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>`;
const IC_TRASH = `<svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4h6v2"/></svg>`;
const IC_ARR   = `<svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>`;

// ── Header helpers ─────────────────────────────────────
function setHeader(title, sub, showBack){
  document.getElementById('h-title').textContent = title;
  document.getElementById('h-sub').textContent = sub;
  const hdr = document.getElementById('header');
  const existing = hdr.querySelector('.btn-back');
  if(showBack && !existing){
    const b = document.createElement('div');
    b.className='btn-icon btn-back'; b.innerHTML=IC_BACK; b.onclick=goBack;
    hdr.insertBefore(b, hdr.firstChild);
  } else if(!showBack && existing){ existing.remove(); }
}

function setProgress(done, total, label){
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-label').textContent = label;
}

// ── RENDER ─────────────────────────────────────────────
function render(){
  if(view.screen==='folders') renderFolders();
  else if(view.screen==='folder') renderFolder();
  else if(view.screen==='task') renderTask();
}

// Screen: Folders
function renderFolders(){
  document.getElementById('tabs-bar').style.display='none';
  document.getElementById('add-label').textContent='Nowy folder';
  document.getElementById('clear-btn').style.display='none';

  let allDone=0, allTotal=0;
  data.folders.forEach(f=>{ const c=countDone(f.tasks); allDone+=c.done; allTotal+=c.total; });
  setHeader('TaskMaster', `${data.folders.length} folderów · ${allTotal-allDone} do zrobienia`, false);
  setProgress(allDone, allTotal, 'Ogólny postęp');

  const el = document.getElementById('content');
  if(!data.folders.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">Brak folderów.<br>Dodaj pierwszy folder!</div></div>`;
    return;
  }

  let html='';
  data.folders.forEach(folder=>{
    const {done,total}=countDone(folder.tasks);
    const isDone = total>0 && done===total;
    const conf = confirmDel?.type==='folder' && confirmDel.id===folder.id;
    html+=`<div class="folder-card${isDone?' done-folder':''}">
      <div class="folder-row" onclick="openFolder('${folder.id}')">
        <div class="folder-icon">${isDone?'✅':'📁'}</div>
        <div class="folder-info">
          <div class="folder-name">${esc(folder.name)}</div>
          <div class="folder-meta">${total} zadań · ${total-done} do zrobienia</div>
        </div>
        ${isDone?`<span class="folder-done-badge">Ukończony</span>`:''}
        <div class="btn-del" onclick="event.stopPropagation();tryDel('folder','${folder.id}')">${IC_TRASH}</div>
        <div class="chevron-right">${IC_NEXT}</div>
      </div>
      ${conf?`<div class="confirm-bar"><span>Usunąć folder i wszystkie zadania?</span>
        <button onclick="cancelDel()">Nie</button>
        <button class="yes" onclick="doDel()">Usuń</button></div>`:''}
    </div>`;
  });
  el.innerHTML=html;
}

// Screen: Folder
function renderFolder(){
  const folder = getFolder(view.fid);
  if(!folder){ view={screen:'folders'}; render(); return; }

  document.getElementById('tabs-bar').style.display='flex';
  document.getElementById('add-label').textContent='Nowe zadanie';
  document.getElementById('tab-active').className='tab'+(folderTab==='active'?' active':'');
  document.getElementById('tab-done').className='tab'+(folderTab==='done'?' active':'');

  const active = folder.tasks.filter(t=>!t.done);
  const done   = folder.tasks.filter(t=>t.done);
  document.getElementById('tc-active').textContent=active.length;
  document.getElementById('tc-done').textContent=done.length;

  const {done:d,total:tot}=countDone(folder.tasks);
  setHeader(folder.name, `${d} / ${tot} ukończone`, true);
  setProgress(d, tot, 'Postęp folderu');

  const hasDone = done.length>0;
  document.getElementById('clear-btn').style.display = (folderTab==='done' && hasDone) ? 'flex' : 'none';

  const list = folderTab==='active' ? active : done;
  const el = document.getElementById('content');

  if(!list.length){
    el.innerHTML=folderTab==='active'
      ? `<div class="empty"><div class="empty-icon">🎉</div><div class="empty-text">Brak aktywnych zadań!<br>Wszystko zrobione.</div></div>`
      : `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Brak zakończonych zadań.</div></div>`;
    return;
  }

  el.innerHTML = list.map(task=>renderTaskCard(task, view.fid, [task.id], 0)).join('');
  attachInlineListeners(el);
}

// Screen: Task detail
function renderTask(){
  const folder = getFolder(view.fid);
  const task = folder?.tasks.find(t=>t.id===view.tid);
  if(!task){ view={screen:'folder',fid:view.fid}; render(); return; }

  document.getElementById('tabs-bar').style.display='none';
  document.getElementById('add-label').textContent='Nowe podzadanie';
  document.getElementById('clear-btn').style.display='none';

  const {done,total}=countDone([task]);
  setHeader(task.name, `${done} / ${total} ukończone`, true);
  setProgress(done, total, 'Postęp zadania');

  const el=document.getElementById('content');
  // Top task card
  let html=`<div class="task-card">
    <div class="task-row">
      <div class="task-check${task.done?' checked':''}" onclick="toggleNode('${view.fid}',['${view.tid}'])">${IC_CHECK}</div>
      <div class="task-body"><div class="task-name${task.done?' done-text':''}">${esc(task.name)}</div></div>
    </div>
  </div>`;
  // Subtasks
  if(task.subtasks?.length){
    html+=task.subtasks.map(s=>renderTaskCard(s,view.fid,[view.tid,s.id],1)).join('');
  } else {
    html+=`<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">Brak podzadań.</div></div>`;
  }
  el.innerHTML=html;
  attachInlineListeners(el);
}

// Render one task card (recursive for nesting)
function renderTaskCard(task, fid, path, level){
  const pathJSON=JSON.stringify(path);
  const isExp=expanded.has(task.id);
  const hasSubs=task.subtasks?.length>0;
  const subDone=task.subtasks?.filter(s=>s.done).length||0;
  const canNest=level<3;
  const conf=confirmDel?.type==='task' && confirmDel.taskId===task.id && confirmDel.fid===fid;

  let html=`<div class="task-card${level>0?' level-'+level:''}">
    <div class="task-row">
      <div class="task-check${task.done?' checked':''}" onclick="toggleNode('${fid}',${pathJSON})">${IC_CHECK}</div>
      <div class="task-body" ${level===0&&view.screen==='folder'?`onclick="openTask('${fid}','${task.id}')"`:''}style="${level===0&&view.screen==='folder'?'cursor:pointer':''}">
        <div class="task-name${task.done?' done-text':''}">${esc(task.name)}</div>
        ${hasSubs?`<div class="sub-count">${subDone}/${task.subtasks.length} podzadań</div>`:''}
      </div>
      ${hasSubs||canNest?`<div class="btn-expand${isExp?' open':''}" onclick="toggleExp('${task.id}')">${IC_ARR}</div>`:''}
      <div class="btn-del" onclick="tryDel('task','${fid}',${pathJSON})">${IC_TRASH}</div>
    </div>
    ${conf?`<div class="confirm-bar"><span>Czy na pewno usunąć?</span>
      <button onclick="cancelDel()">Nie</button>
      <button class="yes" onclick="doDel()">Usuń</button></div>`:''}`;

  if(isExp){
    if(hasSubs){
      html+=`<div class="subtasks-wrap">`;
      task.subtasks.forEach(s=>{
        html+=renderTaskCard(s, fid, [...path,s.id], level+1);
      });
      html+=`</div>`;
    }
    if(canNest){
      html+=`<div class="add-sub-row">
        <input class="add-sub-input" placeholder="+ Dodaj podzadanie..." data-fid="${fid}" data-path='${pathJSON}'/>
        <button class="add-sub-btn" onclick="submitInline(this.previousElementSibling)">Dodaj</button>
      </div>`;
    }
  }
  html+=`</div>`;
  return html;
}

function attachInlineListeners(el){
  el.querySelectorAll('.add-sub-input').forEach(inp=>{
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter') submitInline(inp); });
  });
}

// ── Actions ────────────────────────────────────────────
function toggleNode(fid, path){
  const node=getNode(fid,path);
  if(node){ node.done=!node.done; save(); render(); }
}

function toggleExp(taskId){
  expanded.has(taskId)?expanded.delete(taskId):expanded.add(taskId);
  render();
}

function submitInline(inp){
  const name=inp.value.trim(); if(!name) return;
  const fid=inp.dataset.fid;
  const path=JSON.parse(inp.dataset.path);
  const parent=getNode(fid,path);
  if(!parent) return;
  if(!parent.subtasks) parent.subtasks=[];
  parent.subtasks.push({id:uid(),name,done:false,subtasks:[]});
  expanded.add(path[path.length-1]);
  save(); render();
}

function tryDel(type, ...args){
  if(type==='folder'){
    const [fid]=args;
    confirmDel={type:'folder',id:fid};
  } else {
    const [fid,path]=args;
    const node=getNode(fid,path);
    if(node?.done){ doDelTask(fid,path); return; }
    confirmDel={type:'task',fid,taskPath:path,taskId:path[path.length-1]};
  }
  render();
}
function cancelDel(){ confirmDel=null; render(); }
function doDel(){
  if(!confirmDel) return;
  if(confirmDel.type==='folder'){
    data.folders=data.folders.filter(f=>f.id!==confirmDel.id);
    if(view.screen!=='folders') view={screen:'folders'};
  } else { doDelTask(confirmDel.fid, confirmDel.taskPath); return; }
  confirmDel=null; save(); render();
}
function doDelTask(fid,path){
  const list=getParentList(fid,path);
  const lid=path[path.length-1];
  if(list){ const i=list.findIndex(n=>n.id===lid); if(i!==-1) list.splice(i,1); }
  confirmDel=null; save(); render();
}

function clearDone(){
  if(view.screen==='folder'){
    const folder=getFolder(view.fid);
    if(folder){ folder.tasks=folder.tasks.filter(t=>!t.done); }
  }
  save(); render();
}

function setTab(tab){ folderTab=tab; render(); }

// ── Navigation ─────────────────────────────────────────
function openFolder(fid){ view={screen:'folder',fid}; confirmDel=null; folderTab='active'; render(); }
function openTask(fid,tid){ view={screen:'task',fid,tid}; confirmDel=null; render(); }
function goBack(){
  confirmDel=null;
  if(view.screen==='task') view={screen:'folder',fid:view.fid};
  else view={screen:'folders'};
  render();
}

// ── Modal ──────────────────────────────────────────────
function openAddModal(){
  if(view.screen==='folders'){
    modalMode='folder';
    document.getElementById('modal-title').textContent='Nowy folder';
    document.getElementById('modal-field-label').textContent='Nazwa folderu';
    document.getElementById('modal-input').placeholder='np. Dziś, Praca, Zakupy...';
  } else if(view.screen==='folder'){
    modalMode='task'; modalCtx={fid:view.fid};
    document.getElementById('modal-title').textContent='Nowe zadanie';
    document.getElementById('modal-field-label').textContent='Nazwa zadania';
    document.getElementById('modal-input').placeholder='np. Zadzwonić, Kupić...';
  } else {
    modalMode='subtask'; modalCtx={fid:view.fid,tid:view.tid};
    document.getElementById('modal-title').textContent='Nowe podzadanie';
    document.getElementById('modal-field-label').textContent='Nazwa podzadania';
    document.getElementById('modal-input').placeholder='np. Chleb, Woda...';
  }
  document.getElementById('modal-input').value='';
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('modal-input').focus(),280);
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e){ if(e.target===document.getElementById('overlay')) closeModal(); }

function confirmModal(){
  const name=document.getElementById('modal-input').value.trim(); if(!name) return;
  if(modalMode==='folder'){
    data.folders.push({id:uid(),name,tasks:[]});
  } else if(modalMode==='task'){
    const folder=getFolder(modalCtx.fid);
    if(folder) folder.tasks.push({id:uid(),name,done:false,subtasks:[]});
    folderTab='active';
  } else {
    const folder=getFolder(modalCtx.fid);
    const task=folder?.tasks.find(t=>t.id===modalCtx.tid);
    if(task){ if(!task.subtasks) task.subtasks=[]; task.subtasks.push({id:uid(),name,done:false,subtasks:[]}); }
  }
  save(); closeModal(); render();
}

document.getElementById('modal-input').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmModal(); });

// ── SW ─────────────────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

render();
</script>
</body>
